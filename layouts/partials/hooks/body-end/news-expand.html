<script>
  (function () {
    const btn = document.getElementById('drumpt-news-expand-btn');
    if (!btn) return;
    btn.addEventListener('click', function () {
      const section = document.getElementById('news');
      if (!section) return;
      const expanded = section.classList.toggle('drumpt-news-expanded');
      btn.innerHTML = expanded
        ? 'See Less<i class="fas fa-angle-up"></i>'
        : 'See All<i class="fas fa-angle-right"></i>';
    });
  })();
</script>
